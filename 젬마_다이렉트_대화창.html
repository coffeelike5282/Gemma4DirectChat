<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma 4 Direct - Antigravity Extension</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; margin: 0; overflow: hidden; height: 100vh; }
        .font-outfit { font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #e0b6ff, #00daf3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .bg-void { background-color: #10141a; }
        @keyframes pulse-cyan { 0%, 100% { opacity: 1; box-shadow: 0 0 8px #00daf3; } 50% { opacity: 0.5; box-shadow: 0 0 2px #00daf3; } }
        .animate-pulse-cyan { animation: pulse-cyan 2s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const OLLAMA_BASE_URL = 'http://localhost:11434';

        const App = () => {
            const [messages, setMessages] = useState([
                { role: 'assistant', content: '무엇을 도와드릴까요, 큰형님? 안티그래비티 젬마 4가 대기 중입니다! 🫡' }
            ]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [isConnected, setIsConnected] = useState(false);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [settings, setSettings] = useState({
                temperature: 0.7,
                num_predict: 2048
            });

            const scrollRef = useRef(null);

            const checkConnection = async () => {
                try {
                    const response = await fetch(`${OLLAMA_BASE_URL}/api/tags`);
                    setIsConnected(response.ok);
                } catch {
                    setIsConnected(false);
                }
            };

            const chatWithGemma = async (chatMessages) => {
                try {
                    const response = await fetch(`${OLLAMA_BASE_URL}/api/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: 'gemma4:e2b',
                            messages: chatMessages,
                            options: settings,
                            stream: true,
                        }),
                    });

                    if (!response.ok) throw new Error('Ollama connection failed');

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let fullContent = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        const chunk = decoder.decode(value, { stream: true });
                        const lines = chunk.split('\n');

                        for (const line of lines) {
                            if (!line.trim()) continue;
                            try {
                                const json = JSON.parse(line);
                                if (json.message) {
                                    fullContent += json.message.content;
                                    setMessages(prev => {
                                        const updated = [...prev];
                                        updated[updated.length - 1] = { role: 'assistant', content: fullContent };
                                        return updated;
                                    });
                                }
                            } catch (e) {}
                        }
                    }
                    setIsLoading(false);
                } catch (error) {
                    setMessages(prev => {
                        const updated = [...prev];
                        updated[updated.length - 1] = { role: 'assistant', content: '⚠️ 로컬 Ollama 서버에 연결할 수 없습니다. 터미널에서 ollama serve를 확인해 주십시오!' };
                        return updated;
                    });
                    setIsLoading(false);
                }
            };

            useEffect(() => {
                checkConnection();
                const interval = setInterval(checkConnection, 5000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                if (scrollRef.current) {
                    scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                }
            }, [messages]);

            const handleSend = () => {
                if (!input.trim() || isLoading) return;
                const userMsg = { role: 'user', content: input };
                const nextMessages = [...messages, userMsg];
                setMessages([...nextMessages, { role: 'assistant', content: '' }]);
                setInput('');
                setIsLoading(true);
                chatWithGemma(nextMessages);
            };

            return (
                <div className="flex flex-col h-screen w-full bg-void text-slate-200 overflow-hidden relative">
                    {/* Header */}
                    <div className="px-5 py-4 border-b border-white/10 flex justify-between items-center bg-slate-900/50">
                        <div className="flex items-center gap-3">
                            <div className={`w-2 h-2 rounded-full ${isConnected ? 'bg-[#00daf3] animate-pulse-cyan' : 'bg-red-500'}`} />
                            <h1 className="text-lg font-bold font-outfit gradient-text">Gemma 4 Direct</h1>
                            <span className="text-[10px] bg-white/5 px-2 py-0.5 rounded border border-white/5 text-slate-400">
                                {isConnected ? 'LIVE' : 'OFFLINE'}
                            </span>
                        </div>
                        <button onClick={() => setIsSettingsOpen(true)} className="text-slate-400 hover:text-white transition-colors">⚙️</button>
                    </div>

                    {/* Chat Messages */}
                    <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 space-y-5">
                        {messages.map((msg, i) => (
                            <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[90%] px-4 py-3 rounded-2xl text-sm leading-relaxed ${
                                    msg.role === 'user' 
                                        ? 'bg-slate-800 border border-white/5 text-white rounded-tr-none' 
                                        : 'glass border-l-2 border-[#e0b6ff] text-slate-200 rounded-tl-none'
                                } shadow-lg`}>
                                    {msg.content || <div className="flex gap-1 py-1"><div className="w-1.5 h-1.5 bg-[#e0b6ff] rounded-full animate-bounce"></div><div className="w-1.5 h-1.5 bg-[#e0b6ff] rounded-full animate-bounce delay-75"></div><div className="w-1.5 h-1.5 bg-[#e0b6ff] rounded-full animate-bounce delay-150"></div></div>}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Input Area */}
                    <div className="p-4 bg-slate-900/30 border-t border-white/10">
                        <div className="relative flex items-center gap-2">
                            <textarea
                                value={input}
                                onChange={e => setInput(e.target.value)}
                                onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }}
                                placeholder="젬마에게 명령을 내리십시오..."
                                className="flex-1 bg-black/20 border border-white/5 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#e0b6ff]/50 transition-all resize-none min-h-[48px]"
                                rows="1"
                            />
                            <button
                                onClick={handleSend}
                                disabled={isLoading || !input.trim()}
                                className="p-3 bg-[#9a4ad9] hover:bg-[#8b5cf6] disabled:opacity-30 rounded-xl transition-all shadow-lg text-white"
                            >
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            </button>
                        </div>
                        <p className="text-[9px] text-slate-500 mt-2 text-center uppercase tracking-widest opacity-40">Local Gemma 4 Engine Protected by An-Bon</p>
                    </div>

                    {/* Settings Modal */}
                    {isSettingsOpen && (
                        <div className="absolute inset-0 z-50 flex justify-end">
                            <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" onClick={() => setIsSettingsOpen(false)} />
                            <div className="relative w-64 h-full bg-slate-900 border-l border-white/10 p-6 shadow-2xl transition-transform">
                                <h2 className="text-xl font-bold text-[#e0b6ff] mb-6">Settings</h2>
                                <div className="space-y-6">
                                    <div>
                                        <label className="text-xs text-slate-400 block mb-2">Temperature ({settings.temperature})</label>
                                        <input type="range" min="0" max="1" step="0.1" value={settings.temperature} onChange={e => setSettings({...settings, temperature: parseFloat(e.target.value)})} className="w-full accent-[#e0b6ff]" />
                                    </div>
                                    <div>
                                        <label className="text-xs text-slate-400 block mb-2">Max Tokens</label>
                                        <input type="number" value={settings.num_predict} onChange={e => setSettings({...settings, num_predict: parseInt(e.target.value)})} className="w-full bg-slate-800 border border-white/10 rounded px-2 py-1 text-sm text-white" />
                                    </div>
                                </div>
                                <button onClick={() => setIsSettingsOpen(false)} className="mt-8 w-full py-2 bg-[#9a4ad9]/20 border border-[#9a4ad9]/50 rounded-lg text-sm font-medium hover:bg-[#9a4ad9]/30 transition-all">Close</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
